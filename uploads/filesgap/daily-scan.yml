name: Daily Job Scan

on:
  schedule:
    - cron: "30 3 * * *"        # 03:30 UTC = 09:00 IST daily
  workflow_dispatch: {}

concurrency:
  group: tracker-writes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests           # scan aborts if the engine is broken
        run: python -m pytest tests/ -q

      - name: Run job scan
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python job_scan.py all

      - name: Gap report
        run: python gap_report.py

      - name: Commit reports
        run: |
          git config user.name "job-scanner-bot"
          git config user.email "actions@github.com"
          git add reports/ report.html
          git diff --cached --quiet && exit 0
          git commit -m "Daily scan: $(date +'%d %b %Y')"
          git pull --rebase origin main
          git push
